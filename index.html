<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Next Install</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        App Store
      </div>
      <div class="safe-row">
        <div class="safe-live"><span class="dot"></span>SAFE</div>
      </div>
    </div>

    <div class="card">


      <div class="app-row">
        <div class="app-icon">
          <img src="assets/images/bgmi.png" alt="BGMI icon" />
        </div>
        <div class="app-info">
          <h1>BGMI - NEXT IOS</h1>
          <p class="subtitle">Action • Online Multiplayer</p>
          <div class="meta">
            <span>4.7 ★</span>
            <span>18+ Age</span>
            <span>3.5 GB</span>
          </div>
        </div>
        <a id="install-link" class="get-button" href="#">
          GET
        </a>
      </div>
    </div>

  </div>
  <script>
    const manifestUrl = "/manifests/manifest.plist";
    const installUrl = `itms-services://?action=download-manifest&url=${encodeURIComponent(manifestUrl)}`;
    document.getElementById("install-link").href = installUrl;
  </script>
</body>

</html>
